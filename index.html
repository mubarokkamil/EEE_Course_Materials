<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EEE Course Materials</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="page">

    <header>
      <h1>EEE Course Materials</h1>
      <div class="header-admin-row">
        <a href="admin/" class="admin-icon-btn" title="Go to Admin">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Admin
        </a>
      </div>
      <hr/>
    </header>

    <main id="main-content">
      <!-- root: course list -->
      <div id="view-root"></div>
      <!-- inside course: topic list -->
      <div id="view-course" class="hidden"></div>
      <!-- inside topic: file list -->
      <div id="view-topic" class="hidden"></div>
    </main>

    <footer>
      <hr/>
    </footer>

  </div>

  <!-- File preview overlay -->
  <div id="overlay" class="overlay hidden" onclick="closeOverlay()">
    <div class="overlay-box" onclick="event.stopPropagation()">
      <div class="overlay-header">
        <span id="overlay-title"></span>
        <div style="display:flex;gap:8px;align-items:center;">
          <a id="overlay-open" href="#" target="_blank" class="overlay-open-btn">Open ↗</a>
          <button onclick="closeOverlay()" class="overlay-close">✕</button>
        </div>
      </div>
      <div id="overlay-body" class="overlay-body"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EEE Course Materials</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="page">

    <header>
      <h1>EEE Course Materials</h1>
      <div class="header-admin-row">
        <a href="admin/" class="admin-icon-btn" title="Go to Admin">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Admin
        </a>
      </div>
      <hr/>
    </header>

    <main id="main-content">
      <div id="view-root"></div>
      <div id="view-course" class="hidden"></div>
      <div id="view-topic" class="hidden"></div>
    </main>

    <footer>
      <hr/>
    </footer>

  </div>

  <script>
    // Load data.js fresh every time (no browser cache)
    const s = document.createElement('script');
    s.src = 'data.js?v=' + Date.now();
    s.onload = () => { render(); };
    document.head.appendChild(s);
  </script>
  <script src="app.js"></script>
</body>
</html>
